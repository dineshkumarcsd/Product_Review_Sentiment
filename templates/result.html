<!DOCTYPE html>
<html>

<head>

<title>Sentiment Result</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#11998e,#38ef7d);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:350px;
}

h2{
color:#333;
}

.result{
font-size:32px;
font-weight:bold;
margin:20px 0;
}

a{
text-decoration:none;
background:#11998e;
color:white;
padding:10px 20px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="card">

<h2>Sentiment Result</h2>

<div class="result">
{{prediction}}
</div>

<a href="/">Analyze Another Review</a>

</div>

</body>

</html>
